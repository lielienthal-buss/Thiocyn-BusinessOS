
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join the Team | Take A Shot Hiring Portal</title>
    
    <!-- LinkedIn / Open Graph Meta Tags -->
    <meta property="og:title" content="Join the Unstoppable | Take A Shot GmbH" />
    <meta property="og:description" content="We are looking for doers. Apply now via our AI-powered applicant portal and take your shot." />
    <meta property="og:image" content="https://takeashot.de/og-image-recruiting.jpg" />
    <meta property="og:url" content="https://jobs.takeashot.de" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

</head>
  <body class="bg-slate-200 dark:bg-black text-slate-900 dark:text-slate-100 transition-colors duration-700 min-h-screen">
    <div id="root"></div>
    <!-- Turnstile Script -->
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>
    <!-- Turnstile Widget - will be rendered by ApplicationForm.tsx -->
    <div
      class="cf-turnstile"
      data-sitekey="%VITE_TURNSTILE_SITE_KEY%"
      data-callback="onTurnstileSuccess"
      data-theme="dark"
      data-size="normal"
      data-tabindex="0"
    ></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
